<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nitro Speed - Edition Stylisée</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Arial, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0b0b16; color: white; }
        
        .screen { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: linear-gradient(135deg, rgba(10, 10, 25, 0.98), rgba(25, 10, 10, 0.98)); }
        h1 { font-size: 70px; color: #ff2a2a; text-shadow: 0 0 20px #ff2a2a, 0 5px 0 #800000; margin-bottom: 30px; font-style: italic; font-weight: 900; letter-spacing: 2px; }
        h2 { font-size: 45px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); margin-bottom: 20px; font-style: italic; }
        .btn { padding: 18px 50px; font-size: 26px; color: white; background: linear-gradient(to bottom, #ff3b3b, #cc0000); border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
        .btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 8px 20px rgba(255,0,0,0.6); }
        
        #shopScreen { display: none; overflow-y: auto; padding: 40px 0; }
        .shop-container { display: flex; gap: 25px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; max-width: 85%; }
        .shop-item { background: linear-gradient(145deg, #1f1f3a, #111122); border: 3px solid #333355; padding: 20px; border-radius: 15px; text-align: center; width: 220px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .shop-item:hover { transform: translateY(-5px); border-color: #ff3333; }
        .shop-item.owned { border-color: #00aa55; }
        .shop-item.equipped { background: linear-gradient(145deg, #0d4715, #0a240f); border-color: #00ff66; box-shadow: 0 0 15px rgba(0,255,102,0.4); }
        .skin-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .skin-brand { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .preview-box { height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; }

        #gameContainer { position: relative; width: 100%; height: 100%; display: none; overflow: hidden; }
        #canvas { display: block; background: #222; margin: 0 auto; }
        
        #pauseBtn { position: absolute; top: 20px; left: 20px; width: 55px; height: 55px; font-size: 24px; background: rgba(15, 15, 30, 0.85); border: 2px solid #ff3333; color: white; border-radius: 50%; cursor: pointer; z-index: 5; backdrop-filter: blur(5px); transition: 0.2s; }
        #pauseBtn:hover { background: #ff3333; transform: scale(1.1); }
        
        #speedometer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(0deg, rgba(5,5,15,0.95), rgba(20,20,40,0.9)); border: 3px solid #ff2a2a; padding: 12px 40px; border-radius: 40px; font-size: 32px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.8); font-family: monospace; z-index: 5; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        #volant { position: absolute; bottom: 40px; left: calc(50% - 380px); width: 120px; height: 120px; border: 10px solid #2a2a3a; border-top-color: #ff3333; border-radius: 50%; transition: transform 0.05s linear; z-index: 5; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #volant::after { content: ''; position: absolute; top: calc(50% - 6px); left: 0; width: 100%; height: 12px; background: #2a2a3a; }
        #levier { position: absolute; bottom: 45px; right: calc(50% - 380px); width: 50px; height: 130px; z-index: 5; }
        #levier-pommeau { width: 36px; height: 36px; background: radial-gradient(circle at 30% 30%, #ff4444, #990000); border-radius: 50%; margin: 0 auto; transition: transform 0.1s; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        #levier-tige { width: 8px; height: 90px; background: linear-gradient(90deg, #bbb, #777); margin: -5px auto 0 auto; border-radius: 4px; }

        .score-hud { position: absolute; top: 20px; right: 20px; font-size: 26px; font-weight: bold; background: rgba(10, 10, 25, 0.85); padding: 15px 25px; border-radius: 10px; border-left: 5px solid #ffcc00; text-align: right; z-index: 5; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div id="mainMenu" class="screen">
        <h1>NITRO SPEED</h1>
        <button class="btn" onclick="startGame()">Jouer</button>
    </div>

    <div id="gameOverScreen" class="screen" style="display:none;">
        <h2>GAME OVER</h2>
        <div style="font-size: 22px; margin-bottom: 30px; text-align: center; line-height: 1.8; background: rgba(0,0,0,0.4); padding: 20px 50px; border-radius: 15px;">
            <p>Score de la course : <span id="currentScore" style="color:#00ffcc; font-weight:bold;">0</span></p>
            <p>Pièces récoltées : <span id="currentCoins" style="color:#ffcc00; font-weight:bold;">0</span></p>
            <p style="margin-top: 15px; font-weight: bold; color: #ff3333; text-transform: uppercase; letter-spacing: 1px;">🏆 Records Personnels :</p>
            <p>1ère Place : <span id="best1" style="font-weight:bold;">0</span></p>
            <p>2ème Place : <span id="best2">0</span></p>
            <p>3ème Place : <span id="best3">0</span></p>
        </div>
        <div style="display: flex; gap: 20px;">
            <button class="btn" onclick="restartGame()">Rejouer</button>
            <button class="btn" style="background: linear-gradient(to bottom, #ffcc00, #cc9900); color:black; box-shadow: 0 5px 15px rgba(255,204,0,0.3);" onclick="openShop()">➔ Concessionnaire (Skins)</button>
        </div>
    </div>

    <div id="shopScreen" class="screen">
        <h2>CONCESSIONNAIRE & TUNING</h2>
        <div style="font-size: 26px; color:#ffcc00; margin-bottom: 30px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 10px 25px; border-radius: 20px;">💰 Compte : <span id="shopCoins">0</span> Coins</div>
        
        <h3 style="margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc;">Hypercars Disponibles</h3>
        <div class="shop-container" id="carSkinsContainer"></div>

        <h3 style="margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; color: #ff33ff;">Effets d'Échappement (Flammes)</h3>
        <div class="shop-container" id="flameSkinsContainer"></div>

        <button class="btn" style="background: #444455; box-shadow: none; margin-top: 20px;" onclick="closeShop()">Retour aux résultats</button>
    </div>

    <div id="gameContainer">
        <button id="pauseBtn" onclick="togglePause()">||</button>
        <div class="score-hud">
            Score: <span id="hudScore" style="color:#00ffcc;">0</span><br>
            💰 <span id="hudCoins" style="color:#ffcc00;">0</span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="speedometer"><span id="speedVal">0</span> KM/H</div>
        <div id="volant"></div>
        <div id="levier">
            <div id="levier-pommeau"></div>
            <div id="levier-tige"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const QUALITY = Math.min(window.devicePixelRatio || 1, 4);
        const W = 540;
        const H = window.innerHeight;
        canvas.width = W * QUALITY;
        canvas.height = H * QUALITY;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(QUALITY, QUALITY);

        let gameState = "menu"; 
        let isPaused = false;
        let score = 0;
        let totalCoins = parseInt(localStorage.getItem('nitro_coins_v2')) || 0;
        let sessionCoins = 0;
        let highscores = JSON.parse(localStorage.getItem('nitro_highscores_v2')) || [0, 0, 0];

        let carSkins = [
            { id: 'red', name: 'GT Turbo', brand: 'Nissan Concept', color: '#ff2a2a', cost: 0 },
            { id: 'blue', name: 'Chiron Concept', brand: 'Bugatti', color: '#0055ff', cost: 150 },
            { id: 'gold', name: 'Aventador SVJ', brand: 'Lamborghini', color: '#ffcc00', cost: 500 },
            { id: 'dark', name: 'Vader Stealth', brand: 'Prototype X', color: '#111115', cost: 1200 }
        ];
        let flameSkins = [
            { id: 'orange', name: 'Combustion Standard', color: '#ff5500', cost: 0 },
            { id: 'green', name: 'Nitro Toxique', color: '#00ff44', cost: 200 },
            { id: 'purple', name: 'Fission Violette', color: '#bb00ff', cost: 600 }
        ];

        let unlockedCarSkins = JSON.parse(localStorage.getItem('unlocked_cars_v2')) || ['red'];
        let unlockedFlameSkins = JSON.parse(localStorage.getItem('unlocked_flames_v2')) || ['orange'];
        let activeCarSkin = localStorage.getItem('active_car_v2') || 'red';
        let activeFlameSkin = localStorage.getItem('active_flame_v2') || 'orange';

        let player = {
            x: W / 2 - 22,
            y: H - 240,
            w: 44,
            h: 85,
            speed: 0,
            maxSpeed: 17,
            accel: 0.18,
            decel: 0.04,
            braking: 0.35,
            handling: 7,
            flameActive: false,
            flameTimer: 0
        };

        let keys = { z: false, s: false, q: false, d: false };
        let e_vehicles = [];
        let e_coins = [];
        let e_skidmarks = [];
        let e_airborneBikers = [];
        let roadOffset = 0;

        window.addEventListener('keydown', (e) => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = true; });
        window.addEventListener('keyup', (e) => { 
            let k = e.key.toLowerCase(); 
            if(k in keys) { 
                keys[k] = false; 
                if(k === 'z' && player.speed >= player.maxSpeed - 0.5) {
                    player.flameActive = true;
                    player.flameTimer = 45;
                }
            } 
        });

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            gameState = "playing";
            resetGameVariables();
            animate();
        }

        function resetGameVariables() {
            player.x = W / 2 - player.w / 2;
            player.y = H - 240;
            player.speed = 0;
            player.flameActive = false;
            score = 0;
            sessionCoins = 0;
            e_vehicles = [];
            e_coins = [];
            e_skidmarks = [];
            e_airborneBikers = [];
            isPaused = false;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "▶" : "||";
        }

        function animate() {
            if (gameState !== "playing") return;
            if (!isPaused) {
                updatePhysics();
                spawnElements();
            }
            draw();
            requestAnimationFrame(animate);
        }

        function updatePhysics() {
            if (keys.z) {
                if (player.speed < player.maxSpeed) player.speed += player.accel;
            } else if (keys.s) {
                if (player.speed > -2) player.speed -= player.braking;
                if (player.speed > 2) {
                    e_skidmarks.push(
                        { x: player.x + 6, y: player.y + player.h, w: 6, h: player.speed * 1.2 },
                        { x: player.x + player.w - 12, y: player.y + player.h, w: 6, h: player.speed * 1.2 }
                    );
                }
            } else {
                if (player.speed > 0) player.speed -= player.decel;
                if (player.speed < 0) player.speed += player.decel;
                if (Math.abs(player.speed) < 0.05) player.speed = 0;
            }

            if (keys.q && player.x > 65) player.x -= player.handling;
            if (keys.d && player.x < W - 65 - player.w) player.x += player.handling;

            document.getElementById('volant').style.transform = `rotate(${keys.q ? -40 : (keys.d ? 40 : 0)}deg)`;
            document.getElementById('levier-pommeau').style.transform = `translateY(${keys.z ? -18 : (keys.s ? 18 : 0)}px)`;

            roadOffset += player.speed;
            if (roadOffset > H) roadOffset = 0;

            e_skidmarks.forEach(s => s.y += player.speed);
            if(e_skidmarks.length > 80) e_skidmarks.shift();

            if (player.flameActive) {
                player.flameTimer--;
                if(player.flameTimer <= 0) player.flameActive = false;
            }

            e_coins.forEach((coin, index) => {
                coin.y += player.speed; 
                if (checkCollision(player, coin)) {
                    addCoins(1);
                    e_coins.splice(index, 1);
                }
            });

            e_airborneBikers.forEach((b, idx) => {
                b.y += b.vy;
                b.x += b.vx;
                b.scale += 0.03;
                b.rot += 0.25;
                if (b.y > H + 100) e_airborneBikers.splice(idx, 1);
            });

            e_vehicles.forEach((v, index) => {
                v.y += (player.speed - v.speed);

                if (!v.passed && v.y > player.y + player.h) {
                    v.passed = true;
                    score += 15;
                }

                if (checkCollision(player, v)) {
                    if (v.type === 'moto' || v.type === 'moto_rare') {
                        let bonus = v.type === 'moto_rare' ? 15 : 5;
                        addCoins(bonus);
                        
                        e_airborneBikers.push({
                            x: v.x, y: v.y, vx: (Math.random() - 0.5) * 6, vy: -15, rot: 0, scale: 1
                        });
                        e_vehicles.splice(index, 1);
                        score += 10;
                    } else {
                        endGame();
                    }
                }

                if (v.y > H + 250 || v.y < -450) e_vehicles.splice(index, 1);
            });

            // Empêche les véhicules ennemis de se traverser
            for (let i = 0; i < e_vehicles.length; i++) {
                for (let j = i + 1; j < e_vehicles.length; j++) {
                    let a = e_vehicles[i];
                    let b = e_vehicles[j];
                    if (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y) {
                        let overlapY = (Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y)) / 2;
                        if (a.y < b.y) { a.y -= overlapY; b.y += overlapY; }
                        else { a.y += overlapY; b.y -= overlapY; }
                        if (a.y < b.y) a.speed = Math.min(a.speed, b.speed);
                        else b.speed = Math.min(b.speed, a.speed);
                    }
                }
            }

            document.getElementById('speedVal').innerText = Math.round(player.speed * 18);
            document.getElementById('hudScore').innerText = score;
            document.getElementById('hudCoins').innerText = sessionCoins;
        }

        function addCoins(amount) {
            sessionCoins += amount;
            totalCoins += amount;
            localStorage.setItem('nitro_coins_v2', totalCoins);
        }

        function spawnElements() {
            if (player.speed <= 2) return;

            if (Math.random() < 0.018 && e_vehicles.length < 5) {
                let types = [
                    { type: 'voiture', w: 42, h: 80, speed: 6, color: '#2a82e6' },
                    { type: 'camion', w: 48, h: 140, speed: 4, color: '#cc5500' },
                    { type: 'bus', w: 50, h: 160, speed: 5, color: '#e6b800' },
                    { type: 'moto', w: 22, h: 50, speed: 8, color: '#111' },
                    { type: 'moto_rare', w: 24, h: 50, speed: 11, color: '#ff00ff' }
                ];
                
                let rand = Math.random();
                let chosen = types[0];
                if (rand > 0.94) chosen = types[4]; 
                else if (rand > 0.78) chosen = types[3]; 
                else if (rand > 0.62) chosen = types[2]; 
                else if (rand > 0.40) chosen = types[1]; 

                let lanes = [85, 175, 265, 355];
                let laneX = lanes[Math.floor(Math.random() * lanes.length)] + (40 - chosen.w)/2;

                if (e_vehicles.every(v => Math.abs(v.y - (-160)) > 250 || Math.abs(v.x - laneX) > 30)) {
                    e_vehicles.push({
                        x: laneX, y: -160, w: chosen.w, h: chosen.h,
                        speed: chosen.speed, type: chosen.type, color: chosen.color, passed: false
                    });
                }
            }

            if (Math.random() < 0.015 && e_coins.length < 4) {
                let lanes = [100, 190, 280, 370];
                e_coins.push({ x: lanes[Math.floor(Math.random() * lanes.length)], y: -50, w: 18, h: 18 });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            ctx.fillStyle = "#142c14";
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = "#193d19";
            for (let y = (roadOffset % 80) - 80; y < H; y += 80) {
                ctx.fillRect(0, y, 60, 40);
                ctx.fillRect(W - 60, y, 60, 40);
            }

            ctx.fillStyle = "#1e1e24";
            ctx.fillRect(60, 0, W - 120, H);

            let vibY = (roadOffset % 40) - 40;
            for (let y = vibY; y < H; y += 40) {
                ctx.fillStyle = Math.floor((y - roadOffset)/40) % 2 === 0 ? "#ff3333" : "#ffffff";
                ctx.fillRect(52, y, 8, 40);
                ctx.fillRect(W - 60, y, 8, 40);
            }

            ctx.lineWidth = 4;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            for (let i = 1; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo(60 + (W - 120) / 4 * i, 0);
                ctx.lineTo(60 + (W - 120) / 4 * i, H);
                ctx.stroke();
            }
            ctx.setLineDash([]); 

            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            e_skidmarks.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));

            e_coins.forEach(c => {
                let cx = c.x + c.w/2; let cy = c.y + c.h/2;
                let gradient = ctx.createRadialGradient(cx, cy, 2, cx, cy, c.w/2);
                gradient.addColorStop(0, '#fff2a3');
                gradient.addColorStop(0.8, '#ffcc00');
                gradient.addColorStop(1, '#b38f00');
                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.arc(cx, cy, c.w/2, 0, Math.PI*2); ctx.fill();
            });

            e_vehicles.forEach(v => {
                drawAdvancedVehicle(v.x, v.y, v.w, v.h, v.color, v.type);
            });

            let activeCarColor = carSkins.find(s => s.id === activeCarSkin)?.color || '#ff2a2a';
            let activeFlameColor = flameSkins.find(s => s.id === activeFlameSkin)?.color || '#ff5500';

            if (player.flameActive) {
                ctx.fillStyle = activeFlameColor;
                ctx.beginPath();
                ctx.moveTo(player.x + 8, player.y + player.h);
                ctx.lineTo(player.x + player.w/2, player.y + player.h + 35);
                ctx.lineTo(player.x + player.w - 8, player.y + player.h);
                ctx.closePath();
                ctx.fill();
            }

            ctx.fillStyle = activeCarColor;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#222";
            ctx.fillRect(player.x + 4, player.y + 15, player.w - 8, 15);
            ctx.fillStyle = "#66ccff";
            ctx.fillRect(player.x + 6, player.y + 17, player.w - 12, 11);

            e_airborneBikers.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(b.rot);
                ctx.scale(b.scale, b.scale);
                ctx.fillStyle = "#ff00ff";
                ctx.fillRect(-10, -22, 20, 44);
                ctx.fillStyle = "#000";
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });
        }

        function drawAdvancedVehicle(x, y, w, h, color, type) {
            ctx.fillStyle = color;
            if (type === 'moto' || type === 'moto_rare') {
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = "#333";
                ctx.fillRect(x + 2, y + 4, w - 4, h - 8);
                ctx.fillStyle = "#111";
                ctx.beginPath();
                ctx.arc(x + w/2, y + h/2, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "rgba(255,200,0,0.8)";
                ctx.fillRect(x + w/2 - 2, y + h - 4, 4, 4);
            } else if (type === 'camion') {
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillRect(x + 2, y + 4, w - 4, h - 8);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.fillRect(x + 6, y + 8, w - 12, 14);
                ctx.fillStyle = "#222";
                ctx.fillRect(x - 2, y + 6, 4, h - 12);
                ctx.fillRect(x + w - 2, y + 6, 4, h - 12);
            } else if (type === 'bus') {
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                let winW = w - 16;
                for (let wy = y + 12; wy < y + h - 12; wy += 22) {
                    ctx.fillRect(x + 8, wy, winW, 14);
                }
                ctx.fillStyle = "#ff3333";
                ctx.fillRect(x + w, y + 20, 3, 40);
                ctx.fillRect(x + w, y + 70, 3, 40);
            } else {
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.fillRect(x + 4, y + 8, w - 8, 12);
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                ctx.fillRect(x + 4, y + 24, w - 8, h - 34);
                ctx.fillStyle = "#222";
                ctx.fillRect(x - 2, y + 10, 3, 20);
                ctx.fillRect(x + w - 1, y + 10, 3, 20);
                ctx.fillRect(x - 2, y + h - 30, 3, 20);
                ctx.fillRect(x + w - 1, y + h - 30, 3, 20);
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function endGame() {
            gameState = "gameover";
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';

            document.getElementById('currentScore').innerText = score;
            document.getElementById('currentCoins').innerText = sessionCoins;

            highscores.push(score);
            highscores.sort((a, b) => b - a);
            highscores = highscores.slice(0, 3);
            localStorage.setItem('nitro_highscores_v2', JSON.stringify(highscores));

            document.getElementById('best1').innerText = highscores[0];
            document.getElementById('best2').innerText = highscores[1];
            document.getElementById('best3').innerText = highscores[2];
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            gameState = "playing";
            resetGameVariables();
            animate();
        }

        function openShop() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('shopScreen').style.display = 'flex';
            renderShop();
        }

        function closeShop() {
            document.getElementById('shopScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function renderShop() {
            document.getElementById('shopCoins').innerText = totalCoins;
            
            let carHTML = "";
            carSkins.forEach(skin => {
                let isOwned = unlockedCarSkins.includes(skin.id);
                let isEquipped = activeCarSkin === skin.id;
                let statusText = isEquipped ? "ÉQUIPÉ" : (isOwned ? "CHOISIR" : `💰 ${skin.cost}`);
                let classList = `shop-item ${isOwned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
                
                carHTML += `
                    <div class="${classList}" onclick="buyOrEquipCar('${skin.id}', ${skin.cost})">
                        <div class="skin-title">${skin.name}</div>
                        <div class="skin-brand">${skin.brand}</div>
                        <div class="preview-box">
                            <div style="width:40px;height:70px;background:${skin.color};border-radius:5px;"></div>
                        </div>
                        <span>${statusText}</span>
                    </div>
                `;
            });
            document.getElementById('carSkinsContainer').innerHTML = carHTML;

            let flameHTML = "";
            flameSkins.forEach(skin => {
                let isOwned = unlockedFlameSkins.includes(skin.id);
                let isEquipped = activeFlameSkin === skin.id;
                let statusText = isEquipped ? "ÉQUIPÉ" : (isOwned ? "CHOISIR" : `💰 ${skin.cost}`);
                let classList = `shop-item ${isOwned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
                
                flameHTML += `
                    <div class="${classList}" onclick="buyOrEquipFlame('${skin.id}', ${skin.cost})">
                        <div class="skin-title">${skin.name}</div>
                        <div class="preview-box">
                            <div style="width:10px;height:30px;background:${skin.color};border-radius:3px;"></div>
                        </div>
                        <span>${statusText}</span>
                    </div>
                `;
            });
            document.getElementById('flameSkinsContainer').innerHTML = flameHTML;
        }

        function buyOrEquipCar(id, cost) {
            if (unlockedCarSkins.includes(id)) {
                activeCarSkin = id;
                localStorage.setItem('active_car_v2', id);
            } else if (totalCoins >= cost) {
                totalCoins -= cost;
                localStorage.setItem('nitro_coins_v2', totalCoins);
                unlockedCarSkins.push(id);
                localStorage.setItem('unlocked_cars_v2', JSON.stringify(unlockedCarSkins));
                activeCarSkin = id;
                localStorage.setItem('active_car_v2', id);
            }
            renderShop();
        }

        function buyOrEquipFlame(id, cost) {
            if (unlockedFlameSkins.includes(id)) {
                activeFlameSkin = id;
                localStorage.setItem('active_flame_v2', id);
            } else if (totalCoins >= cost) {
                totalCoins -= cost;
                localStorage.setItem('nitro_coins_v2', totalCoins);
                unlockedFlameSkins.push(id);
                localStorage.setItem('unlocked_flames_v2', JSON.stringify(unlockedFlameSkins));
                activeFlameSkin = id;
                localStorage.setItem('active_flame_v2', id);
            }
            renderShop();
        }
    </script>
</body>
</html>
